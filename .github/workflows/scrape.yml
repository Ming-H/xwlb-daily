name: Daily Scrape

on:
  schedule:
    # 北京时间 21:45 = UTC 13:45
    - cron: '45 13 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date (YYYYMMDD), empty for today'
        required: false
        default: ''

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install jieba pyyaml openai

      - name: Run scrape pipeline
        env:
          # 智谱 GLM key（在仓库 Settings → Secrets 配置 ZHIPUAI_API_KEY 后启用 AI 解读；未配置则自动跳过）
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          LLM_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scraper/run_daily.py --date=${{ github.event.inputs.date }}
          else
            python scraper/run_daily.py --today
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build Hugo
        run: cd site && hugo --minify

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ site/content/
          git diff --staged --quiet || git commit -m "📰 daily update $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
