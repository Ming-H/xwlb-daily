name: Daily Stocks

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00，周一至周五（节假日由脚本内交易日历二次过滤）
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  score-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install akshare pandas

      - name: Run CAN SLIM scoring
        # 阶段1 全市场 spot 初筛 → 阶段2 TOP50 深度取数 → 输出 site/data/picks/latest.json
        # market_state 当前默认 watch；P3 接入宏观灯塔信号后改为读取
        run: python scraper/stocks/engine.py --market watch --enrich-top 50

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Build Hugo
        run: cd site && hugo --minify

      - name: Commit and push picks data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/picks/
          git diff --staged --quiet || git commit -m "📈 daily stock picks $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
