baseURL = 'https://ming-h.github.io/lighthouse/'
defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"
title = '灯塔 Lighthouse · A 股投资辅助终端'
theme = 'PaperMod'

enableRobotsTXT = true
summaryLength = 0
canonifyURLs = true
ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 30

[outputs]
  home = ["HTML", "RSS"]

[params]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = false
  description = "A 股投资辅助终端 · 宏观大势 × CAN SLIM 选股"

  [params.assets]
    favicon = "favicon.svg"

  [params.homeInfoParams]
    Title = "灯塔 Lighthouse"
    Content = "A 股投资辅助终端 · 每日宏观大势 + CAN SLIM 选股"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/Ming-H/xwlb-daily"

