baseURL = 'https://ming-h.github.io/xwlb-daily/'
defaultContentLanguage = "zh-cn"
languageCode = "zh-cn"
title = '央视联播 · 投资参考'
theme = 'PaperMod'

enableRobotsTXT = true
summaryLength = 0
ignoreLogs = ['warning-goldmark-raw-html']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[pagination]
  pagerSize = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  defaultTheme = "auto"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowToc = false
  description = "新闻联播经济信号 · 辅助投资决策"

  [params.homeInfoParams]
    Title = "📺 央视联播 · 投资参考"
    Content = "每日新闻联播经济信号追踪，捕捉投资机会"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/Ming-H/xwlb-daily"

