# ============================================
# 二、用词强度词库（判断政策所处阶段）
# ============================================
intensity_words:
  # 阶段1：探索研究（早期信号）
  early:
    - 探索
    - 研究
    - 试点
    - 调研
    - 论证
    - 前期
    - 摸索
    - 筹备
    - 储备
    - 规划

  # 阶段2：积极推进（升温信号）
  advancing:
    - 推进
    - 推动
    - 加快
    - 促进
    - 落实
    - 部署
    - 组织实施
    - 稳步
    - 扎实推进
    - 深入推进

  # 阶段3：密集大力（主升浪信号）
  intensive:
    - 大力
    - 全面
    - 专项行动
    - 攻坚
    - 突破
    - 加速
    - 倍增
    - 强力
    - 集中
    - 冲刺

  # 阶段4：成果显现（利好出尽信号）
  results:
    - 成效显著
    - 超额完成
    - 圆满完成
    - 历史性
    - 里程碑
    - 新突破
    - 新成效
    - 取得成果

# ============================================
# 三、经济判断关键词（判断新闻是否经济相关）
# ============================================
economy_keywords:
  # 宏观经济
  - GDP
  - CPI
  - PMI
  - PPI
  - 通胀
  - 通缩
  - 增长
  - 下滑
  - 回升
  - 复苏

  # 财政金融
  - 财政
  - 税收
  - 减税
  - 补贴
  - 国债
  - 专项债
  - 预算
  - 投资
  - 融资
  - 信贷

  # 产业经济
  - 产量
  - 销量
  - 出口额
  - 进口额
  - 营收
  - 利润
  - 产值
  - 产能
  - 订单
  - 招投标

  # 市场贸易
  - 市场
  - 消费
  - 零售
  - 外贸
  - 进出口
  - 贸易
  - 关税

  # 量词类（通常伴随经济数据）
  - 万亿
  - 千亿
  - 百亿
  - 亿元
  - 万元
  - 同比
  - 环比
  - 百分点

# ============================================
# 四、投资信号打分权重
# ============================================
scoring:
  frequency_weight: 0.25      # 提及频率权重
  acceleration_weight: 0.25   # 频率加速度权重
  policy_level_weight: 0.20   # 政策级别权重
  intensity_weight: 0.15      # 用词强度权重
  first_mention_weight: 0.15  # 首次出现权重

  # 政策级别分数
  policy_levels:
    国常会: 100
    中央政治局: 95
    国务院: 90
    国家发改委: 80
    工信部: 75
    财政部: 75
    央行: 75
    其他部委: 60
    地方政府: 40

  # 用词强度分数
  intensity_scores:
    early: 30
    advancing: 60
    intensive: 100
    results: 40
